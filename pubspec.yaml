name: taskzen
description: "TaskZen - Smart Task Management App with AI Assistant, Calendar, Analytics & More"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  provider: ^6.1.2
  table_calendar: ^3.1.3
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.6
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.1
  animate_do: ^3.3.4
  percent_indicator: ^4.2.5
  sqflite_common_ffi_web: ^0.4.5+2
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
